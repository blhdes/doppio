name: Doppio
options:
  bundleIdPrefix: app
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Doppio:
    type: application
    platform: iOS
    sources:
      - Doppio
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Doppio
        UILaunchScreen: {}
        UIStatusBarHidden: true
        # No non-exempt encryption — auto-answers the export-compliance question on every upload.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.doppio
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: 1
        DEVELOPMENT_TEAM: 56BK7T2JG7
        CODE_SIGN_STYLE: Automatic
